<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finanzas Freelance</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-900 p-4 text-gray-100 md:p-8">
  <div id="dashboard-page" class="mx-auto max-w-7xl">
    <header class="mb-8 flex flex-col justify-between gap-4 rounded-2xl border border-gray-700 bg-gray-800 p-6 md:flex-row md:items-center">
      <div>
        <h1 class="text-3xl font-bold text-emerald-400">Control Finanzas</h1>
        <p class="mt-1 text-sm text-gray-400">Bienvenido, <span id="usuario-nombre">usuario</span></p>
      </div>
      <div class="flex gap-2">
        <button id="logout-btn" class="rounded border border-gray-700 bg-gray-700 px-3 py-2 text-sm transition hover:bg-gray-600">Cerrar sesión</button>
      </div>
    </header>

    <div id="dashboard-message"></div>

    <section class="mb-8 grid grid-cols-1 gap-4 md:grid-cols-4">
      <div class="rounded-xl border border-gray-700 bg-gray-800 p-4">
        <p class="text-xs uppercase tracking-wider text-gray-400">Ingresos</p>
        <p id="total-ingresos" class="mt-2 text-2xl font-bold text-emerald-400">0</p>
      </div>
      <div class="rounded-xl border border-gray-700 bg-gray-800 p-4">
        <p class="text-xs uppercase tracking-wider text-gray-400">Gastos</p>
        <p id="total-gastos" class="mt-2 text-2xl font-bold text-rose-400">0</p>
      </div>
      <div class="rounded-xl border border-gray-700 bg-gray-800 p-4">
        <p class="text-xs uppercase tracking-wider text-gray-400">Balance</p>
        <p id="total-libre" class="mt-2 text-2xl font-bold text-sky-400">0</p>
      </div>
      <div class="rounded-xl border border-gray-700 bg-gray-800 p-4">
        <p class="text-xs uppercase tracking-wider text-gray-400">Saldo activo</p>
        <p id="total-cuentas" class="mt-2 text-2xl font-bold text-amber-400">0</p>
      </div>
    </section>

    <section class="mb-8 grid grid-cols-1 gap-8 lg:grid-cols-3">
      <div class="rounded-2xl border border-gray-700 bg-gray-800 p-6 lg:col-span-2">
        <div class="mb-4 flex flex-col gap-3 md:flex-row md:items-center md:justify-between">
          <div>
            <h2 class="text-lg font-semibold text-gray-200">Transacciones</h2>
            <span class="text-sm text-gray-400">Crear y revisar</span>
          </div>
          <div class="flex items-center gap-2">
            <label for="cuenta-activa-select" class="text-sm text-gray-400">Cuenta activa</label>
            <select id="cuenta-activa-select" class="rounded border border-gray-600 bg-gray-700 p-2 text-sm text-white focus:border-emerald-400 focus:outline-none"></select>
          </div>
        </div>

        <form id="form-transaccion" class="grid gap-4 md:grid-cols-2">
          <div>
            <label class="mb-1 block text-xs text-gray-400">Tipo</label>
            <select id="transaccion-tipo" class="w-full rounded border border-gray-600 bg-gray-700 p-2.5 text-sm text-white focus:border-emerald-400 focus:outline-none">
              <option value="ingreso">Ingreso</option>
              <option value="gasto">Gasto</option>
            </select>
          </div>
          <div>
            <label class="mb-1 block text-xs text-gray-400">Fecha</label>
            <input id="transaccion-fecha" type="date" class="w-full rounded border border-gray-600 bg-gray-700 p-2.5 text-sm text-white focus:border-emerald-400 focus:outline-none" />
          </div>
          <div>
            <label class="mb-1 block text-xs text-gray-400">Monto</label>
            <input id="transaccion-monto" type="number" step="0.01" required class="w-full rounded border border-gray-600 bg-gray-700 p-2.5 text-sm text-white focus:border-emerald-400 focus:outline-none" />
          </div>
          <div>
            <label class="mb-1 block text-xs text-gray-400">Categoría</label>
            <select id="transaccion-categoria" class="w-full rounded border border-gray-600 bg-gray-700 p-2.5 text-sm text-white focus:border-emerald-400 focus:outline-none"></select>
          </div>
          <div class="md:col-span-2">
            <label class="mb-1 block text-xs text-gray-400">Descripción</label>
            <input id="transaccion-descripcion" type="text" class="w-full rounded border border-gray-600 bg-gray-700 p-2.5 text-sm text-white focus:border-emerald-400 focus:outline-none" />
          </div>
          <div class="md:col-span-2">
            <button id="btn-transaccion" type="submit" class="w-full rounded bg-emerald-500 px-4 py-2.5 font-semibold text-gray-900 transition hover:bg-emerald-400">Crear transacción</button>
          </div>
        </form>

        <div id="transaccion-message"></div>
      </div>

      <div class="rounded-2xl border border-gray-700 bg-gray-800 p-6">
        <div class="mb-4 flex items-center justify-between">
          <h2 class="text-lg font-semibold text-gray-200">Cuentas</h2>
          <span class="text-sm text-gray-400">Saldo actual</span>
        </div>

        <form id="form-cuenta" class="space-y-3">
          <input id="cuenta-nombre" type="text" placeholder="Nombre de la cuenta" required class="w-full rounded border border-gray-600 bg-gray-700 p-2.5 text-sm text-white focus:border-emerald-400 focus:outline-none" />
          <input id="cuenta-saldo" type="number" step="0.01" placeholder="Saldo inicial" class="w-full rounded border border-gray-600 bg-gray-700 p-2.5 text-sm text-white focus:border-emerald-400 focus:outline-none" />
          <button id="btn-cuenta" type="submit" class="w-full rounded bg-sky-500 px-4 py-2.5 font-semibold text-white transition hover:bg-sky-400">Crear cuenta</button>
        </form>

        <div id="cuenta-message"></div>
        <div class="mt-4 overflow-x-auto">
          <table class="w-full text-left text-sm text-gray-400">
            <tbody id="lista-cuentas"></tbody>
          </table>
        </div>
      </div>
    </section>

    <section class="mb-8 grid grid-cols-1 gap-8 lg:grid-cols-2">
      <div class="rounded-2xl border border-gray-700 bg-gray-800 p-6">
        <div class="mb-4 flex items-center justify-between">
          <h2 class="text-lg font-semibold text-gray-200">Categorías</h2>
          <span class="text-sm text-gray-400">Ingreso o gasto</span>
        </div>

        <form id="form-categoria" class="space-y-3">
          <input id="categoria-nombre" type="text" placeholder="Nombre de la categoría" required class="w-full rounded border border-gray-600 bg-gray-700 p-2.5 text-sm text-white focus:border-emerald-400 focus:outline-none" />
          <select id="categoria-tipo" class="w-full rounded border border-gray-600 bg-gray-700 p-2.5 text-sm text-white focus:border-emerald-400 focus:outline-none">
            <option value="ingreso">Ingreso</option>
            <option value="gasto">Gasto</option>
          </select>
          <button id="btn-categoria" type="submit" class="w-full rounded bg-emerald-500 px-4 py-2.5 font-semibold text-gray-900 transition hover:bg-emerald-400">Crear categoría</button>
        </form>

        <div id="categoria-message"></div>
        <div class="mt-4 overflow-x-auto">
          <table class="w-full text-left text-sm text-gray-400">
            <tbody id="lista-categorias"></tbody>
          </table>
        </div>
      </div>

      <div class="rounded-2xl border border-gray-700 bg-gray-800 p-6">
        <div class="mb-4 flex items-center justify-between">
          <h2 class="text-lg font-semibold text-gray-200">Presupuestos</h2>
          <span class="text-sm text-gray-400">Límites por periodo</span>
        </div>

        <form id="form-presupuesto" class="space-y-3">
          <select id="presupuesto-categoria" class="w-full rounded border border-gray-600 bg-gray-700 p-2.5 text-sm text-white focus:border-emerald-400 focus:outline-none"></select>
          <input id="presupuesto-monto" type="number" step="0.01" placeholder="Monto límite" required class="w-full rounded border border-gray-600 bg-gray-700 p-2.5 text-sm text-white focus:border-emerald-400 focus:outline-none" />
          <select id="presupuesto-periodo" class="w-full rounded border border-gray-600 bg-gray-700 p-2.5 text-sm text-white focus:border-emerald-400 focus:outline-none">
            <option value="semanal">Semanal</option>
            <option value="mensual">Mensual</option>
            <option value="anual">Anual</option>
          </select>
          <button id="btn-presupuesto" type="submit" class="w-full rounded bg-amber-500 px-4 py-2.5 font-semibold text-white transition hover:bg-amber-400">Crear presupuesto</button>
        </form>

        <div id="presupuesto-message"></div>
        <div class="mt-4 overflow-x-auto">
          <table class="w-full text-left text-sm text-gray-400">
            <tbody id="lista-presupuestos"></tbody>
          </table>
        </div>
      </div>
    </section>

    <section class="rounded-2xl border border-gray-700 bg-gray-800 p-6">
      <div class="mb-4 flex items-center justify-between">
        <h2 class="text-lg font-semibold text-gray-200">Últimas transacciones</h2>
        <span class="text-sm text-gray-400">Recientes</span>
      </div>

      <div class="overflow-x-auto">
        <table class="w-full text-left text-sm text-gray-400">
          <thead class="text-xs uppercase text-gray-300">
            <tr>
              <th class="p-3">Fecha</th>
              <th class="p-3">Descripción</th>
              <th class="p-3">Cuenta</th>
              <th class="p-3">Categoría</th>
              <th class="p-3">Tipo</th>
              <th class="p-3">Recibo</th>
              <th class="p-3 text-right">Monto</th>
            </tr>
          </thead>
          <tbody id="lista-transacciones"></tbody>
        </table>
      </div>
    </section>
  </div>

  <script src="api.js"></script>
  <script src="app.js"></script>
</body>
</html>
